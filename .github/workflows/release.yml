name: Release

# Bootstrap the repo secrets this workflow needs once it is on GitHub:
#     clihatch secrets rvben/tasmota-cli        # use --dry-run to preview
#
# Each target publishes in its own job, so one target's failure (for example a
# registry rate limit) does not block the others. Re-run only the failed target
# with: gh run rerun <run-id> --failed

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (skip actual publishing)'
        required: false
        default: true
        type: boolean
      skip_crates_io:
        description: 'Skip publishing to crates.io (if already published)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Verify Cargo.lock is up to date
        run: cargo check --locked
      - name: Run tests
        run: make test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --bin tasmota
      - name: Verify binary
        if: ${{ !matrix.cross }}
        run: ./target/${{ matrix.target }}/release/tasmota --version
      - name: Create release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="tasmota-${VERSION}-${{ matrix.target }}"
          mkdir -p release-package
          cp "target/${{ matrix.target }}/release/tasmota" release-package/tasmota
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C release-package tasmota
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          else
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          fi
          rm -rf release-package
      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            tasmota-*-${{ matrix.target }}.tar.gz*

  # crates.io: publish the library first, then the binary crate that depends on it.
  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        if: ${{ inputs.dry_run != true && inputs.skip_crates_io != true }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p tasmota-core --locked
          # Wait for the index to catch up before the dependent crate.
          for i in $(seq 1 30); do
            if cargo publish -p tasmota-cli --locked; then
              exit 0
            fi
            echo "tasmota-core not yet available; retrying in 20s ($i/30)"
            sleep 20
          done
          exit 1
      - name: Test crates.io publish (dry run)
        if: ${{ inputs.dry_run == true && inputs.skip_crates_io != true }}
        run: cargo publish -p tasmota-core --dry-run --locked

  github-release:
    name: Create GitHub release
    needs: build
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/release-*/tasmota-*.tar.gz
            artifacts/release-*/tasmota-*.tar.gz.sha256

  update-homebrew:
    name: Update Homebrew tap
    needs: github-release
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: /tmp/artifacts
      - name: Compute SHA256 hashes
        id: hashes
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            sha=$(cat /tmp/artifacts/release-${target}/tasmota-${{ github.ref_name }}-${target}.tar.gz.sha256 | awk '{print $1}')
            key=$(echo "${target}" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          cat > /tmp/tasmota.rb << 'FORMULA'
          class Tasmota < Formula
            desc "Unofficial CLI for managing Tasmota smart devices over HTTP"
            homepage "https://github.com/rvben/tasmota-cli"
            version "VERSION_NUM"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/rvben/tasmota-cli/releases/download/VERSION/tasmota-VERSION-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE_DARWIN"
              else
                url "https://github.com/rvben/tasmota-cli/releases/download/VERSION/tasmota-VERSION-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE_DARWIN"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/rvben/tasmota-cli/releases/download/VERSION/tasmota-VERSION-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_UNKNOWN_LINUX_GNU"
              else
                url "https://github.com/rvben/tasmota-cli/releases/download/VERSION/tasmota-VERSION-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_UNKNOWN_LINUX_GNU"
              end
            end

            def install
              bin.install "tasmota"
            end

            test do
              system "#{bin}/tasmota", "--version"
            end
          end
          FORMULA

          sed -i "s/VERSION_NUM/${VERSION_NUM}/g" /tmp/tasmota.rb
          sed -i "s/VERSION/${VERSION}/g" /tmp/tasmota.rb
          sed -i "s/SHA_AARCH64_APPLE_DARWIN/${{ steps.hashes.outputs.aarch64_apple_darwin }}/g" /tmp/tasmota.rb
          sed -i "s/SHA_X86_64_APPLE_DARWIN/${{ steps.hashes.outputs.x86_64_apple_darwin }}/g" /tmp/tasmota.rb
          sed -i "s/SHA_AARCH64_UNKNOWN_LINUX_GNU/${{ steps.hashes.outputs.aarch64_unknown_linux_gnu }}/g" /tmp/tasmota.rb
          sed -i "s/SHA_X86_64_UNKNOWN_LINUX_GNU/${{ steps.hashes.outputs.x86_64_unknown_linux_gnu }}/g" /tmp/tasmota.rb

          mkdir -p ~/.ssh
          echo "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

          git clone git@github.com:rvben/homebrew-tap.git /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/tasmota.rb /tmp/tap/Formula/tasmota.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tasmota.rb
          git diff --cached --quiet || git commit -m "Update tasmota to ${VERSION}"
          git push
